name: Build and Push Docker Images to Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # permite execução manual

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build e push da imagem app
      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/movieflix-app:latest

      # Build e push da imagem proxy
      - name: Build and push proxy
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/movieflix-proxy:latest

      # Build e push da imagem etl
      - name: Build and push etl
        uses: docker/build-push-action@v5
        with:
          context: ./etl
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/movieflix-etl:latest
